apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-deploy
  namespace: default
  labels:
    app: hpa-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpa-app
  template:
    metadata:
      labels:
        app: hpa-app
    spec:
      containers:
      - name: hpa-container
        image: k8s.gcr.io/hpa-example
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hpa-svc
  namespace: default
  labels:
    app: hpa-app
spec:
  type: LoadBalancer
  selector:
    app: hpa-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
